# =============================================================================
# nginx vhosts pour hudlgo — coexiste avec Asyora (routage par server_name).
#
# Installation sur le VPS :
#   scp deploy/nginx/hudlgo.conf root@69.62.108.186:/etc/nginx/sites-available/hudlgo
#   ssh root@69.62.108.186
#   ln -s /etc/nginx/sites-available/hudlgo /etc/nginx/sites-enabled/hudlgo
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d hudlgo.com -d www.hudlgo.com -d api.hudlgo.com
#
# certbot --nginx ajoute automatiquement les blocs HTTPS (443) + la redirection
# HTTP->HTTPS. On déclare donc ici uniquement le port 80 ; certbot fait le reste.
# Le port 4100 reste 100% interne (jamais ouvert sur Internet).
# =============================================================================

# --- Front SPA : hudlgo.com + www ---
server {
    listen 80;
    listen [::]:80;
    server_name hudlgo.com www.hudlgo.com;

    root /var/www/hudlgo;          # <-- déposer ici le contenu de `dist/`
    index index.html;

    # React Router : toute route inconnue retombe sur index.html.
    location / {
        try_files $uri /index.html;
    }

    # Assets hashés : cache agressif ; jamais le shell HTML.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}

# --- API : api.hudlgo.com -> NestJS (127.0.0.1:4100) ---
server {
    listen 80;
    listen [::]:80;
    server_name api.hudlgo.com;

    # Uploads (photos de lieux, selfies de vérification) — défaut nginx = 1M.
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
