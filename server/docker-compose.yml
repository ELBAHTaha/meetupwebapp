services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jmaa
      MYSQL_USER: jmaa
      MYSQL_PASSWORD: jmaa
    # Published on 3307 so it matches server/.env (DATABASE_URL …@localhost:3307)
    # and won't collide with a MySQL already running on the host's 3306.
    ports:
      - '3307:3306'
    volumes:
      - jmaa_mysql:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    # Loads Paddle keys (and anything else) from server/.env. The
    # explicit `environment` block below overrides what the container needs
    # (e.g. DATABASE_URL points at the mysql service, not localhost).
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: mysql://jmaa:jmaa@mysql:3306/jmaa
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      JWT_ACCESS_TTL: 900s
      JWT_REFRESH_TTL: 30d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:4000}
      UPLOADS_DIR: uploads
    ports:
      - '4000:4000'
    volumes:
      - jmaa_uploads:/app/uploads
    # On boot: apply migrations, seed (idempotent), then start.
    command: sh -c "npx prisma migrate deploy && node dist/prisma/seed.js || true; node dist/main.js"

volumes:
  jmaa_mysql:
  jmaa_uploads:
